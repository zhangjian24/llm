server:
  port: 8082

spring:
  application:
    name: edu-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: edu-user-service
          uri: lb://edu-user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin strategy=RETAIN_FIRST
      httpclient:
        response-timeout: 30s

logging:
  level:
    com.edu: debug
    org.springframework.cloud.gateway: debug

jwt:
  secret: edu-ai-platform-secret-key-must-be-at-least-256-bits-long